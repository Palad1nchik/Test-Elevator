  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"position:relative;font:700 20px Montserrat;margin-bottom:12px;max-width:80%;\">Эксклюзивный представитель Kasper Elevator<\u002Fdiv><p style=\"position:relative;font:400 15px/1.6 Inter;color:#9DB2CE;margin:0;\">Работаем напрямую с заводом.<\u002Fp><\u002Fdiv>\n        <div style=\"position:relative;background:rgba(17,38,66,0.4);border:1px solid #1E3A5F;border-radius:13px;padding:36px;overflow:hidden;transition:transform .25s,border-color .25s;\" style-hover=\"transform:translateY(-4px);border-color:#3E8BFF;\"><div style=\"position:absolute;top:18px;right:24px;font:900 56px Montserrat;color:rgba(62,139,255,0.10);line-height:1;\">02<\u002Fdiv><div style=\"position:relative;font:700 20px Montserrat;margin-bottom:12px;max-width:80%;\">Собственный склад в Казахстане<\u002Fdiv><p style=\"position:relative;font:400 15px/1.6 Inter;color:#9DB2CE;margin:0;\">Оборудование уже в стране. Не зависим от поставок и не срываем сроки из-за логистики.<\u002Fp><\u002Fdiv>\n        <div style=\"position:relative;background:rgba(17,38,66,0.4);border:1px solid #1E3A5F;border-radius:13px;padding:36px;overflow:hidden;transition:transform .25s,border-color .25s;\" style-hover=\"transform:translateY(-4px);border-color:#3E8BFF;\"><div style=\"position:absolute;top:18px;right:24px;font:900 56px Montserrat;color:rgba(62,139,255,0.10);line-height:1;\">03<\u002Fdiv><div style=\"position:relative;font:700 20px Montserrat;margin-bottom:12px;max-width:80%;\">Полный цикл под ключ<\u002Fdiv><p style=\"position:relative;font:400 15px/1.6 Inter;color:#9DB2CE;margin:0;\">Поставка, монтаж, запуск и сервис — в одной зоне ответственности.<\u002Fp><\u002Fdiv>\n        <div style=\"position:relative;background:rgba(17,38,66,0.4);border:1px solid #1E3A5F;border-radius:13px;padding:36px;overflow:hidden;transition:transform .25s,border-color .25s;\" style-hover=\"transform:translateY(-4px);border-color:#3E8BFF;\"><div style=\"position:absolute;top:18px;right:24px;font:900 56px Montserrat;color:rgba(62,139,255,0.10);line-height:1;\">04<\u002Fdiv><div style=\"position:relative;font:700 20px Montserrat;margin-bottom:12px;max-width:80%;\">Контроль сроков<\u002Fdiv><p style=\"position:relative;font:400 15px/1.6 Inter;color:#9DB2CE;margin:0;\">Фиксируем сроки и выстраиваем процесс под график объекта.<\u002Fp><\u002Fdiv>\n        <div style=\"position:relative;background:rgba(17,38,66,0.4);border:1px solid #1E3A5F;border-radius:13px;padding:36px;overflow:hidden;transition:transform .25s,border-color .25s;\" style-hover=\"transform:translateY(-4px);border-color:#3E8BFF;\"><div style=\"position:absolute;top:18px;right:24px;font:900 56px Montserrat;color:rgba(62,139,255,0.10);line-height:1;\">05<\u002Fdiv><div style=\"position:relative;font:700 20px Montserrat;margin-bottom:12px;max-width:80%;\">Безопасность и соответствие<\u002Fdiv><p style=\"position:relative;font:400 15px/1.6 Inter;color:#9DB2CE;margin:0;\">Контролируем монтаж и подготовку к приёмке — без доработок.<\u002Fp><\u002Fdiv>\n        <div style=\"position:relative;background:rgba(17,38,66,0.4);border:1px solid #1E3A5F;border-radius:13px;padding:36px;overflow:hidden;transition:transform .25s,border-color .25s;\" style-hover=\"transform:translateY(-4px);border-color:#3E8BFF;\"><div style=\"position:absolute;top:18px;right:24px;font:900 56px Montserrat;color:rgba(62,139,255,0.10);line-height:1;\">06<\u002Fdiv><div style=\"position:relative;font:700 20px Montserrat;margin-bottom:12px;max-width:80%;\">Сервис после запуска<\u002Fdiv><p style=\"position:relative;font:400 15px/1.6 Inter;color:#9DB2CE;margin:0;\">Остаёмся после сдачи и берём лифты на обслуживание.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ REQUEST FORM ============ -->\n  <section id=\"request\" data-screen-label=\"Request\" style=\"background:linear-gradient(180deg,#0C1E37,#0A172A);padding:110px 0;border-top:1px solid #1E3A5F;\">\n    <div style=\"max-width:760px;margin:0 auto;padding:0 40px;text-align:center;\">\n      <div style=\"font:600 13px/1 Inter;letter-spacing:0.14em;text-transform:uppercase;color:#5AC8FA;margin-bottom:16px;\">Заявка<\u002Fdiv>\n      <h2 style=\"font:800 clamp(30px,4vw,46px)/1.1 Montserrat;letter-spacing:-0.01em;margin:0 0 14px;\">Рассчитаем сроки и стоимость за 1 день<\u002Fh2>\n      <p style=\"font:400 18px/1.6 Inter;color:#9DB2CE;margin:0 auto 40px;max-width:480px;\">Даём точный расчёт сроков и стоимости под ваш объект.<\u002Fp>\n\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ submit }}\" style=\"background:rgba(17,38,66,0.4);border:1px solid #1E3A5F;border-radius:16px;padding:40px;text-align:left;\">\n          <div style=\"display:flex;flex-direction:column;gap:18px;margin-bottom:24px;\">\n            <input value=\"{{ name }}\" onchange=\"{{ onName }}\" placeholder=\"Имя\" style=\"width:100%;background:rgba(10,23,42,0.6);border:1px solid #1E3A5F;border-radius:11px;padding:16px 18px;color:#fff;font:400 16px Inter;outline:none;transition:border-color .2s;\" style-focus=\"border-color:#3E8BFF;\">\n            <input value=\"{{ phone }}\" onchange=\"{{ onPhone }}\" placeholder=\"Телефон (+7 …)\" style=\"width:100%;background:rgba(10,23,42,0.6);border:1px solid #1E3A5F;border-radius:11px;padding:16px 18px;color:#fff;font:400 16px Inter;outline:none;transition:border-color .2s;\" style-focus=\"border-color:#3E8BFF;\">\n            <input value=\"{{ object }}\" onchange=\"{{ onObject }}\" placeholder=\"Объект / город\" style=\"width:100%;background:rgba(10,23,42,0.6);border:1px solid #1E3A5F;border-radius:11px;padding:16px 18px;color:#fff;font:400 16px Inter;outline:none;transition:border-color .2s;\" style-focus=\"border-color:#3E8BFF;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n            <button type=\"submit\" style=\"flex:1;min-width:200px;background:#3E8BFF;color:#fff;border:none;font:600 16px Inter;padding:17px 24px;border-radius:12px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 10px 30px rgba(62,139,255,0.35);\" style-hover=\"transform:translateY(-3px);box-shadow:0 16px 38px rgba(62,139,255,0.5);\">Получить точный расчёт<\u002Fbutton>\n            <a href=\"#\" style=\"flex:1;min-width:200px;text-align:center;background:rgba(37,211,102,0.12);color:#37D49A;text-decoration:none;border:1px solid rgba(37,211,102,0.4);font:600 16px Inter;padding:17px 24px;border-radius:12px;transition:transform .2s;\" style-hover=\"transform:translateY(-3px);\">Написать в WhatsApp<\u002Fa>\n          <\u002Fdiv>\n          <div style=\"font:400 13px/1.5 Inter;color:#6F89AB;margin-top:18px;text-align:center;\">Нажимая кнопку, вы соглашаетесь с политикой конфиденциальности.<\u002Fdiv>\n        <\u002Fform>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:rgba(55,212,154,0.08);border:1px solid rgba(55,212,154,0.4);border-radius:16px;padding:56px 40px;\">\n          <div style=\"width:64px;height:64px;margin:0 auto 24px;border-radius:50%;background:rgba(55,212,154,0.16);color:#37D49A;display:flex;align-items:center;justify-content:center;font:700 30px Inter;\">✓<\u002Fdiv>\n          <div style=\"font:700 24px Montserrat;margin-bottom:12px;\">Заявка отправлена.<\u002Fdiv>\n          <p style=\"font:400 17px/1.6 Inter;color:#9DB2CE;margin:0 auto 28px;max-width:420px;\">Мы свяжемся с вами в течение рабочего дня.<\u002Fp>\n          <button onclick=\"{{ reset }}\" style=\"background:transparent;color:#fff;border:1px solid #1E3A5F;font:600 15px Inter;padding:13px 26px;border-radius:11px;cursor:pointer;transition:border-color .2s;\" style-hover=\"border-color:#3E8BFF;\">Отправить ещё одну<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:36px;\">\n        <span style=\"font:500 14px Inter;color:#9DB2CE;background:rgba(17,38,66,0.5);border:1px solid #1E3A5F;border-radius:999px;padding:9px 18px;\">Отвечаем за сроки в договоре<\u002Fspan>\n        <span style=\"font:500 14px Inter;color:#9DB2CE;background:rgba(17,38,66,0.5);border:1px solid #1E3A5F;border-radius:999px;padding:9px 18px;\">Доводим до запуска<\u002Fspan>\n        <span style=\"font:500 14px Inter;color:#9DB2CE;background:rgba(17,38,66,0.5);border:1px solid #1E3A5F;border-radius:999px;padding:9px 18px;\">Не переделываем<\u002Fspan>\n        <span style=\"font:500 14px Inter;color:#9DB2CE;background:rgba(17,38,66,0.5);border:1px solid #1E3A5F;border-radius:999px;padding:9px 18px;\">Сдаём без задержек<\u002Fspan>\n        <span style=\"font:500 14px Inter;color:#9DB2CE;background:rgba(17,38,66,0.5);border:1px solid #1E3A5F;border-radius:999px;padding:9px 18px;\">Остаёмся на связи<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer data-screen-label=\"Footer\" style=\"background:#06101F;border-top:1px solid #1E3A5F;padding:56px 0;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;display:flex;justify-content:space-between;align-items:flex-start;gap:32px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:14px;\">\n        <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(145deg,#3E8BFF,#5AC8FA);display:flex;align-items:center;justify-content:center;font:900 22px Montserrat;color:#06101f;\">K<\u002Fdiv>\n        <div style=\"line-height:1;\"><div style=\"font:800 22px/1 Montserrat;letter-spacing:-0.01em;\">KASPER<\u002Fdiv><div style=\"font:600 10px/1 Inter;letter-spacing:0.22em;color:#9DB2CE;margin-top:4px;\">ELEVATOR · KZ<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px;\">\n        <a href=\"tel:+70000000000\" style=\"font:600 18px Inter;color:#5AC8FA;text-decoration:none;\">+7 (000) 000-00-00<\u002Fa>\n        <a href=\"mailto:info@kasper.kz\" style=\"font:600 18px Inter;color:#5AC8FA;text-decoration:none;\">info@kasper.kz<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1240px;margin:36px auto 0;padding:0 40px;font:400 14px Inter;color:#6F89AB;\">© 2026 Kasper Elevator Казахстан. Эксклюзивный представитель.<\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ============ WHATSAPP FAB ============ -->\n  <a href=\"#request\" style=\"position:fixed;right:24px;bottom:24px;z-index:60;display:flex;align-items:center;gap:12px;background:#25D366;color:#06231a;text-decoration:none;font:700 15px Inter;padding:14px 22px;border-radius:999px;box-shadow:0 12px 34px rgba(37,211,102,0.45);transition:transform .2s,box-shadow .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 18px 42px rgba(37,211,102,0.6);\">\n    <span style=\"width:26px;height:26px;flex:none;border-radius:50% 50% 50% 4px;background:#06231a;display:flex;align-items:center;justify-content:center;\"><span style=\"width:9px;height:9px;border:2px solid #25D366;border-radius:50%;\"><\u002Fspan><\u002Fspan>\n    Написать и получить расчёт\n  <\u002Fa>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { submitted: false, name: '', phone: '', object: '' };\n  renderVals() {\n    return {\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      name: this.state.name,\n      phone: this.state.phone,\n      object: this.state.object,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onPhone: (e) => this.setState({ phone: e.target.value }),\n      onObject: (e) => this.setState({ object: e.target.value }),\n      submit: (e) => { e.preventDefault(); this.setState({ submitted: true }); },\n      reset: () => this.setState({ submitted: false, name: '', phone: '', object: '' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
