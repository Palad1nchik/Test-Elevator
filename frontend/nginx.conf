# nginx config for the production frontend container.
# Serves the built React SPA and reverse-proxies /api to the Go backend.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets — helps with the ~500 concurrent users target.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed build assets aggressively; they are content-hashed by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API reverse proxy -> backend service (name "backend" comes from docker-compose).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every unknown path returns index.html so React Router
    # can handle client-side routing (multi-page navigation).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
